<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تلاوة — Tilawa</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'UthmanicHafs';
    src: url('UthmanicHafs1Ver18.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
</style>
<style>
  :root {
    --bg: #1a1a1a;
    --surface: #232323;
    --border: #2e2e2e;
    --text-dim: #3a3a3a;
    --text-muted: #555;
    --text-inactive: #666;
    --text-active: #d1d1d1;
    --text-bright: #f0ede6;
    --cursor: #e2b96f;
    --correct: #6a9e6a;
    --incorrect: #9e5a5a;
    --accent: #e2b96f;
    --font-arabic: 'UthmanicHafs', 'Amiri', serif;
    --font-ui: 'Inter', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-active);
    font-family: var(--font-ui);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-arabic);
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 0.5px;
    direction: rtl;
  }

  .logo span {
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--font-ui);
    margin-right: 10px;
    font-weight: 300;
    direction: ltr;
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
    direction: ltr;
  }

  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-value { color: var(--accent); font-size: 16px; font-weight: 500; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

  /* Main container */
  .main {
    width: 100%;
    max-width: 900px;
    padding: 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  /* Surah selector */
  .surah-selector {
    display: flex;
    align-items: center;
    gap: 16px;
    direction: ltr;
  }

  .surah-selector select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-active);
    padding: 8px 16px;
    border-radius: 6px;
    font-family: var(--font-ui);
    font-size: 13px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .surah-selector select:focus { border-color: var(--accent); }

  .btn-restart {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 16px;
    border-radius: 6px;
    font-family: var(--font-ui);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn-restart:hover { border-color: var(--accent); color: var(--accent); }

  /* Status indicator */
  .status {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    display: flex;
    align-items: center;
    gap: 8px;
    direction: ltr;
    height: 20px;
    transition: color 0.3s;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }

  .status.listening .status-dot {
    background: #6a9e6a;
    box-shadow: 0 0 8px #6a9e6a88;
    animation: pulse 1.5s infinite;
  }

  .status.listening { color: var(--text-active); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Words display — three lines visible */
  .words-container {
    width: 100%;
    direction: rtl;
    position: relative;
    height: 320px;
    overflow: visible;
  }

  /* Three lines: prev (fading out top), current, next (fading out bottom) */
  .ayah-line {
    position: absolute;
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 4px 0px;
    direction: rtl;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease;
    font-family: var(--font-arabic);
    font-size: 34px;
    line-height: 1.8;
    padding: 8px 0;
  }

  .ayah-line.line-prev {
    transform: translateY(-110%);
    opacity: 0.45;
    pointer-events: none;
  }

  /* Keep correct/incorrect colors vivid even in prev/next lines */
  .ayah-line.line-prev .word.correct,
  .ayah-line.line-next .word.correct { color: var(--correct); opacity: 1; }
  .ayah-line.line-prev .word.incorrect,
  .ayah-line.line-next .word.incorrect { color: var(--incorrect); opacity: 1; }

  .ayah-line.line-current {
    transform: translateY(0%);
    opacity: 1;
  }

  .ayah-line.line-next {
    transform: translateY(110%);
    opacity: 0.35;
    pointer-events: none;
  }

  .word {
    position: relative;
    display: inline-block;
    color: var(--text-dim);
    padding: 0 6px;
    transition: color 0.15s;
    cursor: default;
    border-radius: 4px;
    white-space: nowrap;
  }

  .word.correct { color: var(--correct); }
  .word.incorrect { color: var(--incorrect); }
  .word.current { color: var(--text-bright); }

  /* Cursor — blinking line on right side of current word (RTL) */
  .word.current::before {
    content: '';
    position: absolute;
    right: -1px;
    top: 15%;
    height: 70%;
    width: 2px;
    background: var(--cursor);
    border-radius: 1px;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Ayah number badge inside circle */
  .ayah-marker {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-arabic);
    font-size: 16px;
    color: var(--accent);
    opacity: 0.7;
    margin: 0 6px;
    position: relative;
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }

  .ayah-marker svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  .ayah-marker span {
    position: relative;
    z-index: 1;
    font-size: 13px;
    line-height: 1;
  }

  /* Current ayah label */
  .ayah-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    direction: ltr;
    text-align: center;
  }

  /* Mic button */
  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    direction: ltr;
  }

  .mic-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    outline: none;
  }

  .mic-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .mic-btn.active {
    border-color: #6a9e6a;
    color: #6a9e6a;
    box-shadow: 0 0 20px #6a9e6a33;
    animation: micpulse 2s infinite;
  }

  @keyframes micpulse {
    0%, 100% { box-shadow: 0 0 20px #6a9e6a33; }
    50% { box-shadow: 0 0 30px #6a9e6a66; }
  }

  .mic-btn svg { width: 22px; height: 22px; }

  .hint {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* Progress */
  .progress-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
    direction: ltr;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* Notification toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-active);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 12px;
    font-family: var(--font-ui);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    direction: ltr;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Loading */
  .loading {
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--font-ui);
    direction: ltr;
    letter-spacing: 1px;
  }

  /* Completion */
  .completion {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    direction: ltr;
  }

  .completion.show { display: flex; }

  .completion-title {
    font-family: var(--font-arabic);
    font-size: 28px;
    color: var(--accent);
    direction: rtl;
  }

  .completion-stats {
    display: flex;
    gap: 32px;
  }

  .c-stat { text-align: center; }
  .c-stat-value { font-size: 28px; color: var(--text-bright); font-weight: 300; }
  .c-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  /* Keyboard shortcut hint */
  .shortcuts {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: var(--text-dim);
    direction: ltr;
  }

  .key {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 10px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">تلاوة <span>tilawa</span></div>
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat">
      <div class="stat-value" id="statCorrect">0</div>
      <div class="stat-label">correct</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statSkipped">0</div>
      <div class="stat-label">skipped</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statProgress">0%</div>
      <div class="stat-label">progress</div>
    </div>
  </div>
</header>

<div class="main">

  <div class="surah-selector">
    <select id="surahSelect">
      <option value="">— select surah —</option>
    </select>
    <button class="btn-restart" id="restartBtn" style="display:none">↺ restart</button>
  </div>

  <div class="progress-bar" id="progressBar" style="display:none">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="status" id="status">
    <div class="status-dot"></div>
    <span id="statusText">select a surah to begin</span>
  </div>

  <div class="ayah-label" id="ayahLabel"></div>
  <div class="words-container" id="wordsContainer">
  </div>

  <div class="completion" id="completion">
    <div class="completion-title">أحسنت 🌙</div>
    <div class="completion-stats">
      <div class="c-stat">
        <div class="c-stat-value" id="finalCorrect">0</div>
        <div class="c-stat-label">correct</div>
      </div>
      <div class="c-stat">
        <div class="c-stat-value" id="finalSkipped">0</div>
        <div class="c-stat-label">skipped</div>
      </div>
      <div class="c-stat">
        <div class="c-stat-value" id="finalAccuracy">0%</div>
        <div class="c-stat-label">accuracy</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="mic-btn" id="micBtn" style="display:none" title="Start / Stop listening">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <div class="hint" id="micHint" style="display:none">click mic or press space</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="shortcuts">
  <span><span class="key">space</span> mic on/off</span>
  <span><span class="key">tab</span> restart</span>
</div>

<script>
// ──────────────────────────────────────────────────────────────
// 👇 SET YOUR QUL JSON FILE PATH HERE
const QUL_JSON_PATH = 'qpc-hafs-word-by-word.json';
const FONTS_DIR = 'fonts/'; // folder containing p1.woff2 ... p604.woff2
// ──────────────────────────────────────────────────────────────

// ── Surah → Start Page mapping (Madina Mushaf / Hafs) ────────
const SURAH_START_PAGES = [
  1,2,50,77,103,128,151,177,187,208,
  221,235,249,262,267,282,293,305,312,322,
  332,342,350,359,367,377,385,396,404,411,
  415,418,428,434,440,446,453,458,467,477,
  483,489,496,503,507,511,515,519,523,526,
  529,531,535,537,539,542,544,546,549,551,
  553,554,556,558,560,562,564,566,568,570,
  572,574,575,577,578,580,582,582,583,584,
  585,586,587,587,588,589,590,591,591,592,
  593,593,594,595,595,596,596,597,597,598,
  598,599,599,600,601,601,601,602,602,603,
  603,603,604,604
];

// Returns page number for a given surah (1-indexed)
function getPageForSurah(surahNum) {
  return SURAH_START_PAGES[surahNum - 1] || 1;
}

// Returns page number for a given surah+ayah
// Approximates by using surah start page + ayah offset heuristic
// For a recite-along app this is accurate enough since we just need the font
let ayahPageCache = {};
function getPageForAyah(surahNum, ayahNum) {
  const key = surahNum + ':' + ayahNum;
  if (ayahPageCache[key]) return ayahPageCache[key];
  // Use surah start page as base — font will be correct for most of surah
  // For longer surahs the page may differ by a few but font is consistent per juz
  return SURAH_START_PAGES[surahNum - 1] || 1;
}

// ── Dynamically load page font ───────────────────────────────
let loadedFonts = new Set();
let currentFontPage = -1;

function loadPageFont(pageNum) {
  if (pageNum === currentFontPage) return Promise.resolve();
  currentFontPage = pageNum;

  const fontName = 'QCFPage' + pageNum;
  const fontUrl = FONTS_DIR + 'p' + pageNum + '.woff2';

  // Inject @font-face
  document.getElementById('dynamicFont').textContent = `
    @font-face {
      font-family: '${fontName}';
      src: url('${fontUrl}') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
  `;

  // Apply to all ayah lines
  document.querySelectorAll('.ayah-line').forEach(el => {
    el.style.fontFamily = fontName + ", 'Amiri', serif";
  });

  // Store for buildLine to use
  window._currentPageFont = fontName;
  return Promise.resolve();
}

// ── Surah metadata ───────────────────────────────────────────
const SURAHS = [
  {n:1,name:"Al-Fatiha",ar:"الفاتحة"},{n:2,name:"Al-Baqarah",ar:"البقرة"},
  {n:3,name:"Ali 'Imran",ar:"آل عمران"},{n:4,name:"An-Nisa",ar:"النساء"},
  {n:5,name:"Al-Ma'idah",ar:"المائدة"},{n:6,name:"Al-An'am",ar:"الأنعام"},
  {n:7,name:"Al-A'raf",ar:"الأعراف"},{n:8,name:"Al-Anfal",ar:"الأنفال"},
  {n:9,name:"At-Tawbah",ar:"التوبة"},{n:10,name:"Yunus",ar:"يونس"},
  {n:96,name:"Al-Alaq",ar:"العلق"},{n:97,name:"Al-Qadr",ar:"القدر"},
  {n:98,name:"Al-Bayyinah",ar:"البينة"},{n:99,name:"Az-Zalzalah",ar:"الزلزلة"},
  {n:100,name:"Al-Adiyat",ar:"العاديات"},{n:101,name:"Al-Qari'ah",ar:"القارعة"},
  {n:102,name:"At-Takathur",ar:"التكاثر"},{n:103,name:"Al-Asr",ar:"العصر"},
  {n:104,name:"Al-Humazah",ar:"الهمزة"},{n:105,name:"Al-Fil",ar:"الفيل"},
  {n:106,name:"Quraysh",ar:"قريش"},{n:107,name:"Al-Ma'un",ar:"الماعون"},
  {n:108,name:"Al-Kawthar",ar:"الكوثر"},{n:109,name:"Al-Kafirun",ar:"الكافرون"},
  {n:110,name:"An-Nasr",ar:"النصر"},{n:111,name:"Al-Masad",ar:"المسد"},
  {n:112,name:"Al-Ikhlas",ar:"الإخلاص"},{n:113,name:"Al-Falaq",ar:"الفلق"},
  {n:114,name:"An-Nas",ar:"الناس"},
];

// ── State ────────────────────────────────────────────────────
let words = [];
let ayahs = [];
let currentIdx = 0;
let currentAyahIdx = 0;
let correctCount = 0;
let skippedCount = 0;
let isListening = false;
let recognition = null;
let isComplete = false;
let wrongIdx = -1; // index of last incorrectly recited word
let micStartTime = 0;
let lastAdvancedTranscript = ""; // transcript that last caused an advance — ignore if fired again

// ── DOM ──────────────────────────────────────────────────────
const surahSelect    = document.getElementById('surahSelect');
const wordsContainer = document.getElementById('wordsContainer');
const micBtn         = document.getElementById('micBtn');
const statusEl       = document.getElementById('status');
const statusText     = document.getElementById('statusText');
const progressFill   = document.getElementById('progressFill');
const progressBar    = document.getElementById('progressBar');
const statsBar       = document.getElementById('statsBar');
const statCorrect    = document.getElementById('statCorrect');
const statSkipped    = document.getElementById('statSkipped');
const statProgress   = document.getElementById('statProgress');
const restartBtn     = document.getElementById('restartBtn');
const completion     = document.getElementById('completion');
const micHint        = document.getElementById('micHint');
const toastEl        = document.getElementById('toast');
const ayahLabel      = document.getElementById('ayahLabel');

// ── Populate surah list ──────────────────────────────────────
SURAHS.forEach(s => {
  const opt = document.createElement('option');
  opt.value = s.n;
  opt.textContent = `${s.n}. ${s.ar} — ${s.name}`;
  surahSelect.appendChild(opt);
});

// ── Normalize ────────────────────────────────────────────────
// Only strip diacritics + unify alef forms — nothing else
function normalize(text) {
  if (!text) return '';
  return text
    // Layer 1: Standard tashkeel (fatha, damma, kasra, sukun, shadda, tanween)
    .replace(/[ً-ْ]/g, '')
    // Layer 2: Special Uthmani/KFGQPC marks (stop signs, small letters, sajdah etc.)
    .replace(/[ؐ-ؚۖ-ۜ۟-۪ۨ-ٰۭ]/g, '')
    // Layer 3: Normalize alif variants to plain alif (STT always returns bare alif)
    .replace(/[ٱآأإا]/g, 'ا')
    // Layer 4: Ta marbuta to ha (pause = ha sound, STT transcribes as ha)
    .replace(/ة/g, 'ه')
    // Layer 5: Alif maqsura to ya (used interchangeably in digital text)
    .replace(/ى/g, 'ي')
    .trim()
    .replace(/\s+/g, ' ');
}
// ── Levenshtein similarity ───────────────────────────────────
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) =>
    Array.from({length: n+1}, (_, j) => i===0 ? j : j===0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function similarity(a, b) {
  if (!a || !b) return 0;
  return 1 - levenshtein(a, b) / Math.max(a.length, b.length);
}

// ── Ayah marker check ────────────────────────────────────────
function isAyahMarker(text) {
  return /^[\u0660-\u0669\u06F0-\u06F9]+$/.test(text.trim());
}

// ── Ayah number SVG circle ───────────────────────────────────
function makeAyahMarker(num) {
  const arNum = String(num).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
  return `<span class="ayah-marker"><svg viewBox="0 0 36 36" fill="none"><path d="M18 2 C26 2 34 8 34 18 C34 28 26 34 18 34 C10 34 2 28 2 18 C2 8 10 2 18 2 Z" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.6"/></svg><span>${arNum}</span></span>`;
}

// ── Audio feedback ───────────────────────────────────────────
let audioCtx = null;
function getACtx() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playTone(freq, dur, vol=0.12) {
  try {
    const ctx = getACtx(), osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.value = freq; g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playCorrect() { playTone(880, 0.08); setTimeout(()=>playTone(1100,0.1,0.07),80); }
function playIncorrect() { playTone(220, 0.15); }

// ── Load surah ───────────────────────────────────────────────
async function loadSurah(surahNum) {
  setStatus('loading...', false);
  wordsContainer.innerHTML = '<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text-muted);font-size:13px;letter-spacing:1px">loading...</span>';
  try {
    const res = await fetch(QUL_JSON_PATH);
    if (!res.ok) throw new Error('File not found: ' + QUL_JSON_PATH);
    const data = await res.json();

    words = [];
    Object.values(data).forEach(entry => {
      if (String(entry.surah) !== String(surahNum)) return;
      if (isAyahMarker(entry.text)) return;
      words.push({ text: entry.text, ayah: parseInt(entry.ayah), wordIdx: parseInt(entry.word), status: null });
    });
    words.sort((a, b) => a.ayah - b.ayah || a.wordIdx - b.wordIdx);
    if (!words.length) throw new Error('No words found for surah ' + surahNum);

    ayahs = [];
    let cur = null;
    words.forEach((w, i) => {
      w.globalIdx = i;
      if (!cur || cur.ayahNum !== w.ayah) { cur = {ayahNum: w.ayah, words: []}; ayahs.push(cur); }
      cur.words.push(w);
    });

    initRecitation();
  } catch(e) {
    wordsContainer.innerHTML = `<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#9e5a5a;font-size:13px">error: ${e.message}</span>`;
    setStatus('error', false);
  }
}

// ── Init ─────────────────────────────────────────────────────
function initRecitation() {
  currentIdx = 0; currentAyahIdx = 0;
  correctCount = 0; skippedCount = 0;
  isComplete = false;
  wrongIdx = -1;
  lastAdvancedTranscript = "";
  words.forEach(w => w.status = null);
  renderLines(); updateStats();
  progressBar.style.display = 'block';
  statsBar.style.display = 'flex';
  micBtn.style.display = 'flex';
  micHint.style.display = 'block';
  restartBtn.style.display = 'inline-block';
  completion.classList.remove('show');
  setStatus('ready — press mic to start', false);
}

// ── Render lines ─────────────────────────────────────────────
function buildLine(ayahObj) {
  const line = document.createElement('div');
  line.className = 'ayah-line';
  ayahObj.words.forEach(w => {
    const span = document.createElement('span');
    span.className = 'word';
    span.id = `w${w.globalIdx}`;
    span.textContent = w.text;
    if (w.status === 'correct') span.classList.add('correct');
    else if (w.status === 'incorrect') span.classList.add('incorrect');
    line.appendChild(span);
  });
  line.insertAdjacentHTML('beforeend', makeAyahMarker(ayahObj.ayahNum));
  return line;
}

function renderLines() {
  wordsContainer.innerHTML = '';
  const prev = ayahs[currentAyahIdx - 1];
  const curr = ayahs[currentAyahIdx];
  const next = ayahs[currentAyahIdx + 1];
  if (prev) { const el = buildLine(prev); el.classList.add('line-prev'); wordsContainer.appendChild(el); }
  if (curr) {
    const el = buildLine(curr); el.classList.add('line-current'); wordsContainer.appendChild(el);
    const wEl = document.getElementById(`w${currentIdx}`);
    if (wEl) wEl.classList.add('current');
  }
  if (next) { const el = buildLine(next); el.classList.add('line-next'); wordsContainer.appendChild(el); }
  if (curr) {
    const s = SURAHS.find(s => s.n === parseInt(surahSelect.value));
    ayahLabel.textContent = s ? `${s.ar} · ayah ${curr.ayahNum} of ${ayahs.length}` : `ayah ${curr.ayahNum}`;
  }
}

function updateWordEl(idx, cls) {
  const el = document.getElementById(`w${idx}`);
  if (!el) return;
  el.classList.remove('current','correct','incorrect');
  if (cls) el.classList.add(cls);
}

// ── Advance word ─────────────────────────────────────────────
function advanceWord(wasCorrect) {
  words[currentIdx].status = wasCorrect ? 'correct' : 'incorrect';
  updateWordEl(currentIdx, wasCorrect ? 'correct' : 'incorrect');
  if (wasCorrect) { correctCount++; playCorrect(); }
  else { skippedCount++; playIncorrect(); }
  currentIdx++;
  updateStats();
  if (currentIdx >= words.length) { finishRecitation(); return; }
  const nextWord = words[currentIdx];
  if (nextWord.ayah !== ayahs[currentAyahIdx].ayahNum) {
    currentAyahIdx++;
    // Check if page changed — load new font if needed
    const newAyah = ayahs[currentAyahIdx];
    if (newAyah) {
      const newPage = getPageForAyah(newAyah.words[0].ayah <= 0 ? 1 : parseInt(surahSelect.value), newAyah.ayahNum);
      loadPageFont(newPage);
    }
    renderLines();
  } else {
    updateWordEl(currentIdx, 'current');
  }
  feedGrammarHint();
}

// ── Grammar hint ─────────────────────────────────────────────
function feedGrammarHint() {
  if (!recognition || currentIdx >= words.length) return;
  try {
    const SGL = window.SpeechGrammarList || window.webkitSpeechGrammarList;
    if (SGL) {
      const gl = new SGL();
      gl.addFromString(`#JSGF V1.0; grammar word; public <word> = ${normalize(words[currentIdx].text)};`, 1);
      recognition.grammars = gl;
    }
  } catch(e) {}
}

// ── Word matching ────────────────────────────────────────────
function isMatch(a, b) {
  if (!a || !b) return false;
  // Exact match
  if (a === b) return true;
  // Inclusion match — handles STT returning phrase containing the word
  if (a.includes(b) || b.includes(a)) return true;
  // Fuzzy fallback — handles minor transcription noise (1 char diff = ~0.8+ on short words)
  return similarity(a, b) >= 0.80;
}

// token    = single word from STT (last token only)
// isFinal  = whether STT has finalized this result
function matchWord(token, isFinal) {
  if (currentIdx >= words.length) return;

  const tokenNorm = normalize(token);
  if (!tokenNorm || tokenNorm.length < 1) return;

  const currentWord = words[currentIdx];
  const targetNorm = normalize(currentWord.text);

  // ── Case 1: Current word already marked red (retry mode) ──
  // User is trying to correct a previously failed word
  if (currentWord.status === 'incorrect') {
    if (isMatch(tokenNorm, targetNorm)) {
      // Corrected! Turn green and advance
      currentWord.status = 'correct';
      correctCount++;
      skippedCount--;
      updateWordEl(currentIdx, 'correct');
      playCorrect();
      currentIdx++;
      updateStats();
      if (currentIdx >= words.length) { finishRecitation(); return; }
      if (words[currentIdx].ayah !== ayahs[currentAyahIdx].ayahNum) {
        currentAyahIdx++;
        renderLines();
      } else {
        updateWordEl(currentIdx, 'current');
      }
      if (isListening) {
        header.classList.add('focus-mode');
        controlsDock.classList.add('focus-mode');
      }
    }
    // If still wrong, just wait — no action on interim wrong attempts
    return;
  }

  // ── Case 2: Correct match — advance ──────────────────────
  if (isMatch(tokenNorm, targetNorm)) {
    advanceWord(true);
    return;
  }

  // ── Case 3: Wrong — only act on final results ─────────────
  // Never mark red on interim — STT is still building the word
  if (isFinal) {
    // Mark red, stay on word — user must retry
    currentWord.status = 'incorrect';
    skippedCount++;
    updateWordEl(currentIdx, 'incorrect');
    playIncorrect();
    updateStats();
  }
}


// ── Speech recognition ───────────────────────────────────────
function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Speech recognition not supported. Use Chrome.'); return false; }
  recognition = new SR();
  recognition.lang = 'ar-SA';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;

  recognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const isFinal = e.results[i].isFinal;

      // Collect all alternatives into one pool
      let bestTranscript = '';
      let bestSim = -1;
      const expectedNorm = currentIdx < words.length ? normalize(words[currentIdx].text) : '';

      for (let alt = 0; alt < e.results[i].length; alt++) {
        const t = e.results[i][alt].transcript.trim();
        // Pick the alternative that best matches current expected word
        const tokens = t.split(/\s+/).filter(Boolean);
        const lastToken = tokens[tokens.length - 1] || '';
        const s = similarity(normalize(lastToken), expectedNorm);
        if (s > bestSim) { bestSim = s; bestTranscript = t; }
      }

      if (!bestTranscript) continue;

      // Always use only the LAST token — the most recently spoken word
      const tokens = bestTranscript.trim().split(/\s+/).filter(Boolean);
      const lastToken = tokens[tokens.length - 1];

      if (lastToken) matchWord(lastToken, isFinal);
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return;
    showToast('Speech error: ' + e.error);
    stopListening();
  };

  recognition.onend = () => {
    if (isListening && !isComplete) {
      try { recognition.start(); } catch(e) {}
    }
  };
  return true;
}


// ── Controls ─────────────────────────────────────────────────
function toggleListening() {
  if (isComplete || !words.length) return;
  isListening ? stopListening() : startListening();
}
function startListening() {
  if (!recognition && !setupRecognition()) return;
  try {
    feedGrammarHint();
    recognition.start();
    micStartTime = Date.now();
    isListening = true;
    micBtn.classList.add('active');
    setStatus('listening', true);
  } catch(e) {}
}
function stopListening() {
  if (recognition) { try { recognition.stop(); } catch(e) {} }
  isListening = false;
  micBtn.classList.remove('active');
  setStatus('paused — press mic to resume', false);
}

// ── Finish ───────────────────────────────────────────────────
function finishRecitation() {
  stopListening(); isComplete = true;
  const total = correctCount + skippedCount;
  const accuracy = total > 0 ? Math.round((correctCount/total)*100) : 0;
  document.getElementById('finalCorrect').textContent = correctCount;
  document.getElementById('finalSkipped').textContent = skippedCount;
  document.getElementById('finalAccuracy').textContent = accuracy + '%';
  completion.classList.add('show');
  setStatus('surah complete!', false);
  showToast('ما شاء الله — surah complete!');
}

// ── Stats / status / toast ───────────────────────────────────
function updateStats() {
  const pct = words.length > 0 ? Math.round((currentIdx/words.length)*100) : 0;
  statCorrect.textContent = correctCount;
  statSkipped.textContent = skippedCount;
  statProgress.textContent = pct + '%';
  progressFill.style.width = pct + '%';
}
function setStatus(msg, listening) {
  statusText.textContent = msg;
  statusEl.className = 'status' + (listening ? ' listening' : '');
}
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// ── Events ───────────────────────────────────────────────────
surahSelect.addEventListener('change', () => {
  const val = surahSelect.value; if (!val) return;
  stopListening(); loadSurah(parseInt(val));
});
micBtn.addEventListener('click', toggleListening);
restartBtn.addEventListener('click', () => { stopListening(); initRecitation(); });
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && words.length) { e.preventDefault(); toggleListening(); }
  if (e.code === 'Tab' && words.length) { e.preventDefault(); stopListening(); initRecitation(); }
});

// ── Init display ─────────────────────────────────────────────
wordsContainer.innerHTML = '<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text-muted);font-family:var(--font-ui);font-size:14px;letter-spacing:1px">select a surah to begin</span>';
</script>
</body>
